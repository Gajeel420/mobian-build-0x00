# wvkbd Cyberdeck Theme Configuration
# Source this file or use these values with wvkbd command-line flags
#
# Usage: wvkbd-mobintl $(cat /path/to/cyberdeck-theme.conf | grep -v '^#' | tr '\n' ' ')

# Background: Black with 75% opacity (RRGGBBAA)
--bg 000000C0

# Key borders / foreground: Green
--fg 00FF00

# Special key foreground: Dark green
--fg-sp 008800

# Key press highlight: Darker green
--press 004400

# Text color: White
--text FFFFFF
